<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Shop System</title>
    <meta name="description" content="Built with caffeine.ai" />
    <meta property="og:title" content="Save Shop System" />
    <meta property="og:description" content="Built with caffeine.ai" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FIFO Bridge" />
    <link rel="apple-touch-icon" href="/assets/diamond-logo.jpg" />
    <script type="module" crossorigin src="/assets/index-Bt77HP0S.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DjfdJMBV.css">
  </head>
  <body>
    <!-- Splash Screen -->
    <div
      id="splash-screen"
      style="
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #ffffff 0%, #f0f4ff 50%, #ede9fe 100%);
        gap: 16px;
      "
    >
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @keyframes splash-fade-in {
          from { opacity: 0; transform: scale(0.85) translateY(10px); }
          to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes logo-pulse {
          0%, 100% { transform: scale(1); filter: drop-shadow(0 8px 24px rgba(99,102,241,0.25)); }
          50%       { transform: scale(1.06); filter: drop-shadow(0 12px 32px rgba(99,102,241,0.45)); }
        }
        @keyframes shimmer {
          0%   { opacity: 0.6; }
          50%  { opacity: 1; }
          100% { opacity: 0.6; }
        }
        @keyframes title-slide-up {
          from { opacity: 0; transform: translateY(12px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        #splash-logo-wrap {
          animation: splash-fade-in 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards,
                     logo-pulse 2.4s ease-in-out 0.7s infinite;
          opacity: 0;
        }
        #splash-title {
          animation: title-slide-up 0.45s ease-out 0.4s forwards;
          opacity: 0;
        }
        #splash-subtitle {
          animation: title-slide-up 0.45s ease-out 0.55s forwards;
          opacity: 0;
        }
        #splash-spinner {
          animation: title-slide-up 0.3s ease-out 0.7s forwards;
          opacity: 0;
        }
        .facet-shimmer {
          animation: shimmer 1.8s ease-in-out infinite;
        }
        .facet-shimmer-delay {
          animation: shimmer 1.8s ease-in-out 0.6s infinite;
        }
        .facet-shimmer-delay2 {
          animation: shimmer 1.8s ease-in-out 1.1s infinite;
        }
      </style>

      <!-- Animated SVG Diamond Logo -->
      <div id="splash-logo-wrap">
        <svg
          width="96"
          height="96"
          viewBox="0 0 96 96"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-label="FIFO Bridge Logo"
        >
          <defs>
            <!-- Main gem gradient: indigo → purple → pink -->
            <linearGradient id="gem-main" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#6366F1" />
              <stop offset="50%"  stop-color="#8B5CF6" />
              <stop offset="100%" stop-color="#EC4899" />
            </linearGradient>
            <!-- Top facet: lighter -->
            <linearGradient id="gem-top" x1="48" y1="8" x2="48" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#a5b4fc" />
              <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.7" />
            </linearGradient>
            <!-- Left facet -->
            <linearGradient id="gem-left" x1="8" y1="36" x2="48" y2="88" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#818cf8" />
              <stop offset="100%" stop-color="#6366F1" stop-opacity="0.8" />
            </linearGradient>
            <!-- Right facet -->
            <linearGradient id="gem-right" x1="88" y1="36" x2="48" y2="88" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#c084fc" />
              <stop offset="100%" stop-color="#EC4899" stop-opacity="0.9" />
            </linearGradient>
            <!-- Sparkle -->
            <radialGradient id="sparkle-glow" cx="50%" cy="50%" r="50%">
              <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9" />
              <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0" />
            </radialGradient>
            <!-- Drop shadow filter -->
            <filter id="gem-shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366F1" flood-opacity="0.3" />
            </filter>
          </defs>

          <!-- Gem body -->
          <g filter="url(#gem-shadow)">
            <!-- Full gem outline fill -->
            <polygon
              points="48,8 88,36 48,88 8,36"
              fill="url(#gem-main)"
            />
            <!-- Top facet (lighter upper portion) -->
            <polygon
              class="facet-shimmer"
              points="48,8 88,36 48,40 8,36"
              fill="url(#gem-top)"
              opacity="0.9"
            />
            <!-- Left side lower facet -->
            <polygon
              class="facet-shimmer-delay"
              points="8,36 48,40 48,88"
              fill="url(#gem-left)"
              opacity="0.8"
            />
            <!-- Right side lower facet -->
            <polygon
              class="facet-shimmer-delay2"
              points="88,36 48,40 48,88"
              fill="url(#gem-right)"
              opacity="0.8"
            />
            <!-- Inner horizontal divider line (gem belt) -->
            <line x1="8" y1="36" x2="88" y2="36" stroke="white" stroke-width="0.8" stroke-opacity="0.4" />
            <!-- Center vertical line -->
            <line x1="48" y1="8" x2="48" y2="88" stroke="white" stroke-width="0.6" stroke-opacity="0.25" />
            <!-- Diagonal facet lines -->
            <line x1="48" y1="8" x2="8" y2="36" stroke="white" stroke-width="0.8" stroke-opacity="0.3" />
            <line x1="48" y1="8" x2="88" y2="36" stroke="white" stroke-width="0.8" stroke-opacity="0.3" />
            <!-- Sparkle highlight top-left of gem -->
            <ellipse
              class="facet-shimmer"
              cx="34"
              cy="25"
              rx="7"
              ry="5"
              fill="url(#sparkle-glow)"
              transform="rotate(-20, 34, 25)"
            />
          </g>

          <!-- "FB" text centered in gem -->
          <text
            x="48"
            y="51"
            text-anchor="middle"
            dominant-baseline="middle"
            font-family="system-ui, -apple-system, sans-serif"
            font-size="17"
            font-weight="800"
            fill="white"
            opacity="0.92"
            letter-spacing="1"
          >FB</text>
        </svg>
      </div>

      <!-- App name with gradient text -->
      <div id="splash-title" style="text-align: center; line-height: 1.2;">
        <span style="
          font-size: 22px;
          font-weight: 800;
          font-family: system-ui, -apple-system, sans-serif;
          background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #db2777 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          letter-spacing: -0.3px;
        ">FIFO Bridge</span>
      </div>

      <!-- Subtitle -->
      <div id="splash-subtitle" style="margin-top: -6px;">
        <p style="
          color: #9ca3af;
          font-size: 12.5px;
          font-family: system-ui, -apple-system, sans-serif;
          font-weight: 500;
          letter-spacing: 0.4px;
          text-align: center;
        ">Save Shop System</p>
      </div>

      <!-- Loading spinner (light indigo) -->
      <div id="splash-spinner" style="margin-top: 4px;">
        <div style="
          width: 28px;
          height: 28px;
          border: 2.5px solid #e0e7ff;
          border-top-color: #6366f1;
          border-radius: 50%;
          animation: spin 0.85s linear infinite;
        "></div>
      </div>
    </div>

    <div id="root"></div>
  </body>
</html>
